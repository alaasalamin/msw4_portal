name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          REVERB_APP_ID: ${{ secrets.REVERB_APP_ID }}
          REVERB_APP_KEY: ${{ secrets.REVERB_APP_KEY }}
          REVERB_APP_SECRET: ${{ secrets.REVERB_APP_SECRET }}
          MAIL_HOST: ${{ secrets.MAIL_HOST }}
          MAIL_PORT: ${{ secrets.MAIL_PORT }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_ENCRYPTION: ${{ secrets.MAIL_ENCRYPTION }}
          MAIL_FROM_ADDRESS: ${{ secrets.MAIL_FROM_ADDRESS }}
          MAIL_FROM_NAME: ${{ secrets.MAIL_FROM_NAME }}
          DHL_API_KEY: ${{ secrets.DHL_API_KEY }}
          DHL_API_SECRET: ${{ secrets.DHL_API_SECRET }}
          DHL_USERNAME: ${{ secrets.DHL_USERNAME }}
          DHL_PASSWORD: ${{ secrets.DHL_PASSWORD }}
          DHL_EKP: ${{ secrets.DHL_EKP }}
          DHL_BILLING_NUMBER_DOMESTIC: ${{ secrets.DHL_BILLING_NUMBER_DOMESTIC }}
          DHL_BILLING_NUMBER_INTERNATIONAL: ${{ secrets.DHL_BILLING_NUMBER_INTERNATIONAL }}
          DHL_SANDBOX: ${{ secrets.DHL_SANDBOX }}
        with:
          host: 217.160.255.189
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: REVERB_APP_ID,REVERB_APP_KEY,REVERB_APP_SECRET,MAIL_HOST,MAIL_PORT,MAIL_USERNAME,MAIL_PASSWORD,MAIL_ENCRYPTION,MAIL_FROM_ADDRESS,MAIL_FROM_NAME,DHL_API_KEY,DHL_API_SECRET,DHL_USERNAME,DHL_PASSWORD,DHL_EKP,DHL_BILLING_NUMBER_DOMESTIC,DHL_BILLING_NUMBER_INTERNATIONAL,DHL_SANDBOX
          script: |
            export COMPOSER_ALLOW_SUPERUSER=1

            # Install required PHP extensions and Redis if missing
            apt install -y php8.4-dom php8.4-xml php8.4-mbstring php8.4-curl php8.4-zip php8.4-mysql php8.4-tokenizer php8.4-fpm php8.4-redis redis-server
            systemctl enable redis-server
            systemctl start redis-server

            # Clone repo if it doesn't exist, otherwise pull
            if [ ! -d "/var/www/bizo.technology/.git" ]; then
              git clone git@github.com:alaasalamin/msw4_portal.git /var/www/bizo.technology
            fi

            cd /var/www/bizo.technology

            # Pull latest code
            git pull origin main

            # Install PHP dependencies
            composer install --no-dev --optimize-autoloader --no-interaction

            # Install Node dependencies and build assets
            npm install
            npm run build

            # Copy .env if not exists
            if [ ! -f ".env" ]; then
              cp .env.example .env
              php8.4 artisan key:generate
            fi

            # Inject DHL variables into .env
            set_env() {
              local key=$1
              local value=$2
              if [ -n "$value" ]; then
                if grep -q "^${key}=" .env; then
                  sed -i "s|^${key}=.*|${key}=${value}|" .env
                else
                  echo "${key}=${value}" >> .env
                fi
              fi
            }

            set_env REVERB_APP_ID "$REVERB_APP_ID"
            set_env REVERB_APP_KEY "$REVERB_APP_KEY"
            set_env REVERB_APP_SECRET "$REVERB_APP_SECRET"
            set_env REVERB_HOST "bizo.technology"
            set_env REVERB_PORT "8080"
            set_env REVERB_SCHEME "https"
            set_env VITE_REVERB_APP_KEY "$REVERB_APP_KEY"
            set_env VITE_REVERB_HOST "bizo.technology"
            set_env VITE_REVERB_PORT "8080"
            set_env VITE_REVERB_SCHEME "https"
            set_env BROADCAST_CONNECTION "reverb"
            set_env MAIL_MAILER "smtp"
            set_env MAIL_HOST "$MAIL_HOST"
            set_env MAIL_PORT "$MAIL_PORT"
            set_env MAIL_USERNAME "$MAIL_USERNAME"
            set_env MAIL_PASSWORD "$MAIL_PASSWORD"
            set_env MAIL_ENCRYPTION "$MAIL_ENCRYPTION"
            set_env MAIL_FROM_ADDRESS "$MAIL_FROM_ADDRESS"
            set_env MAIL_FROM_NAME "\"$MAIL_FROM_NAME\""
            set_env DHL_API_KEY "$DHL_API_KEY"
            set_env DHL_API_SECRET "$DHL_API_SECRET"
            set_env DHL_USERNAME "$DHL_USERNAME"
            set_env DHL_PASSWORD "$DHL_PASSWORD"
            set_env DHL_EKP "$DHL_EKP"
            set_env DHL_BILLING_NUMBER_DOMESTIC "$DHL_BILLING_NUMBER_DOMESTIC"
            set_env DHL_BILLING_NUMBER_INTERNATIONAL "$DHL_BILLING_NUMBER_INTERNATIONAL"
            set_env DHL_SANDBOX "$DHL_SANDBOX"

            # Clear caches before migration
            php8.4 artisan config:clear
            php8.4 artisan route:clear
            php8.4 artisan view:clear
            php8.4 artisan cache:clear

            # Run migrations
            php8.4 artisan migrate --force

            # Rebuild caches
            php8.4 artisan config:cache
            php8.4 artisan route:cache
            php8.4 artisan view:cache

            # Set Redis as queue, cache and session driver
            set_env QUEUE_CONNECTION "redis"
            set_env CACHE_STORE "redis"
            set_env SESSION_DRIVER "redis"
            set_env REDIS_HOST "127.0.0.1"
            set_env REDIS_PORT "6379"

            # Setup queue worker as a systemd service if not exists
            if [ ! -f /etc/systemd/system/laravel-queue.service ]; then
              cp /var/www/bizo.technology/deploy/laravel-queue.service /etc/systemd/system/laravel-queue.service
              systemctl daemon-reload
              systemctl enable laravel-queue
              systemctl start laravel-queue
            fi

            # Setup Reverb WebSocket server as a systemd service if not exists
            if [ ! -f /etc/systemd/system/laravel-reverb.service ]; then
              cp /var/www/bizo.technology/deploy/laravel-reverb.service /etc/systemd/system/laravel-reverb.service
              systemctl daemon-reload
              systemctl enable laravel-reverb
              systemctl start laravel-reverb
            fi

            # Restart workers so they pick up new code
            php8.4 artisan queue:restart
            systemctl restart laravel-queue
            systemctl restart laravel-reverb

            # Fix permissions
            chown -R www-data:www-data storage bootstrap/cache
            chmod -R 775 storage bootstrap/cache

            # Configure Nginx if PHP-FPM block is missing
            if ! grep -q "fastcgi_pass" /etc/nginx/sites-available/bizo.technology; then
              cp /var/www/bizo.technology/deploy/nginx.conf /etc/nginx/sites-available/bizo.technology
              nginx -t && systemctl reload nginx
            fi
