name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DHL_API_KEY: ${{ secrets.DHL_API_KEY }}
          DHL_API_SECRET: ${{ secrets.DHL_API_SECRET }}
          DHL_USERNAME: ${{ secrets.DHL_USERNAME }}
          DHL_PASSWORD: ${{ secrets.DHL_PASSWORD }}
          DHL_EKP: ${{ secrets.DHL_EKP }}
          DHL_BILLING_NUMBER_DOMESTIC: ${{ secrets.DHL_BILLING_NUMBER_DOMESTIC }}
          DHL_BILLING_NUMBER_INTERNATIONAL: ${{ secrets.DHL_BILLING_NUMBER_INTERNATIONAL }}
          DHL_SANDBOX: ${{ secrets.DHL_SANDBOX }}
        with:
          host: 217.160.255.189
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DHL_API_KEY,DHL_API_SECRET,DHL_USERNAME,DHL_PASSWORD,DHL_EKP,DHL_BILLING_NUMBER_DOMESTIC,DHL_BILLING_NUMBER_INTERNATIONAL,DHL_SANDBOX
          script: |
            export COMPOSER_ALLOW_SUPERUSER=1

            # Install required PHP extensions if missing
            apt install -y php8.4-dom php8.4-xml php8.4-mbstring php8.4-curl php8.4-zip php8.4-mysql php8.4-tokenizer php8.4-fpm

            # Clone repo if it doesn't exist, otherwise pull
            if [ ! -d "/var/www/bizo.technology/.git" ]; then
              git clone git@github.com:alaasalamin/msw4_portal.git /var/www/bizo.technology
            fi

            cd /var/www/bizo.technology

            # Pull latest code
            git pull origin main

            # Install PHP dependencies
            composer install --no-dev --optimize-autoloader --no-interaction

            # Install Node dependencies and build assets
            npm install
            npm run build

            # Copy .env if not exists
            if [ ! -f ".env" ]; then
              cp .env.example .env
              php8.4 artisan key:generate
            fi

            # Inject DHL variables into .env
            set_env() {
              local key=$1
              local value=$2
              if [ -n "$value" ]; then
                if grep -q "^${key}=" .env; then
                  sed -i "s|^${key}=.*|${key}=${value}|" .env
                else
                  echo "${key}=${value}" >> .env
                fi
              fi
            }

            set_env DHL_API_KEY "$DHL_API_KEY"
            set_env DHL_API_SECRET "$DHL_API_SECRET"
            set_env DHL_USERNAME "$DHL_USERNAME"
            set_env DHL_PASSWORD "$DHL_PASSWORD"
            set_env DHL_EKP "$DHL_EKP"
            set_env DHL_BILLING_NUMBER_DOMESTIC "$DHL_BILLING_NUMBER_DOMESTIC"
            set_env DHL_BILLING_NUMBER_INTERNATIONAL "$DHL_BILLING_NUMBER_INTERNATIONAL"
            set_env DHL_SANDBOX "$DHL_SANDBOX"

            # Run migrations
            php8.4 artisan migrate --force

            # Clear and cache config
            php8.4 artisan config:cache
            php8.4 artisan route:cache
            php8.4 artisan view:cache

            # Restart queue workers if any
            php8.4 artisan queue:restart

            # Fix permissions
            chown -R www-data:www-data storage bootstrap/cache
            chmod -R 775 storage bootstrap/cache

            # Configure Nginx if PHP-FPM block is missing
            if ! grep -q "fastcgi_pass" /etc/nginx/sites-available/bizo.technology; then
              cp /var/www/bizo.technology/deploy/nginx.conf /etc/nginx/sites-available/bizo.technology
              nginx -t && systemctl reload nginx
            fi
