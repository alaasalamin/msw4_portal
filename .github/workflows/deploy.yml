name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 217.160.255.189
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            export COMPOSER_ALLOW_SUPERUSER=1

            # Clone repo if it doesn't exist, otherwise pull
            if [ ! -d "/var/www/bizo.technology/.git" ]; then
              git clone git@github.com:alaasalamin/msw4_portal.git /var/www/bizo.technology
            fi

            cd /var/www/bizo.technology

            # Pull latest code
            git pull origin main

            # Install PHP dependencies
            composer install --no-dev --optimize-autoloader --no-interaction

            # Install Node dependencies and build assets
            npm install
            npm run build

            # Copy .env if not exists
            if [ ! -f ".env" ]; then
              cp .env.example .env
              php8.4 artisan key:generate
            fi

            # Run migrations
            php8.4 artisan migrate --force

            # Clear and cache config
            php8.4 artisan config:cache
            php8.4 artisan route:cache
            php8.4 artisan view:cache

            # Restart queue workers if any
            php8.4 artisan queue:restart

            # Fix permissions
            chown -R www-data:www-data storage bootstrap/cache
            chmod -R 775 storage bootstrap/cache

            # Configure Nginx if PHP-FPM block is missing
            if ! grep -q "fastcgi_pass" /etc/nginx/sites-available/bizo.technology; then
              cat > /etc/nginx/sites-available/bizo.technology << 'NGINX'
server {
    server_name bizo.technology www.bizo.technology;
    root /var/www/bizo.technology/public;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/bizo.technology/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bizo.technology/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.bizo.technology) {
        return 301 https://$host$request_uri;
    }

    if ($host = bizo.technology) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name bizo.technology www.bizo.technology;
    return 404;
}
NGINX
              nginx -t && systemctl reload nginx
            fi
