<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Dark night sky background -->
  <rect width="40" height="40" rx="9" fill="#1C0800"/>
  <!-- Atmospheric orange glow -->
  <circle cx="20" cy="24" r="24" fill="#EA580C" opacity="0.22"/>
  <!-- Moon body -->
  <circle cx="20" cy="20" r="17" fill="#EDE0C4"/>
  <!-- Subtle edge shading -->
  <circle cx="22" cy="18" r="17" fill="#C8B48A" opacity="0.22"/>
  <!-- Crater top-right -->
  <circle cx="28" cy="11" r="4.5" fill="#C0A878"/>
  <circle cx="28" cy="11" r="3" fill="#A8906A"/>
  <circle cx="27.4" cy="10.4" r="1.4" fill="#DDD0B0" fill-opacity="0.7"/>
  <!-- Crater left -->
  <circle cx="10" cy="21" r="3.2" fill="#C0A878"/>
  <circle cx="10" cy="21" r="1.9" fill="#A8906A"/>
  <circle cx="9.6" cy="20.6" r="0.9" fill="#DDD0B0" fill-opacity="0.6"/>
  <!-- Crater bottom-right -->
  <circle cx="27" cy="30" r="3.5" fill="#C0A878"/>
  <circle cx="27" cy="30" r="2.2" fill="#A8906A"/>
  <circle cx="26.5" cy="29.5" r="1" fill="#DDD0B0" fill-opacity="0.6"/>
  <!-- Crater top-left -->
  <circle cx="13" cy="8" r="2.2" fill="#C0A878"/>
  <circle cx="13" cy="8" r="1.2" fill="#A8906A"/>
  <!-- Tiny crater right -->
  <circle cx="34" cy="21" r="1.6" fill="#C0A878"/>
  <circle cx="34" cy="21" r="0.9" fill="#A8906A"/>
  <!-- Tiny crater bottom -->
  <circle cx="15" cy="34" r="1.3" fill="#C0A878"/>
  <circle cx="15" cy="34" r="0.7" fill="#A8906A"/>
</svg>
